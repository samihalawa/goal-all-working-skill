interface:
  display_name: "Goal All Working"
  short_description: "Convert a broad finish-everything request into a compact goal, then analyze and complete every relevant user-visible or durable workflow"
  default_prompt: "Use $goal-all-working-skill when the user says the whole app/repo/workflow must work, no placeholders or non-working functionality can remain, every menu button and flow must be usable, or asks for a compact Goal to pursue prompt. First reconstruct the real intent from relevant conversation/history, then classify the conversation type: domain, durable system, effect type, proof layer, and safety boundary. For code/UI work, inventory all routes, menus, forms, buttons, mocks, placeholders, API/DB paths, auth states, saved/contact/chat flows, loading/error/empty/success states, and duplicated entry points. For non-code work, inventory promised items, provider/tracker/mail/data/deploy states, durable records, target lists, runs/jobs, refs, and verification layers. Do not trust prior done/fixed/sent/deployed/submitted claims. Fix the failure classes, sweep siblings, verify at the same user-visible or durable layer, red-team false finishes, then commit, push, deploy, send, sync, update, or live-verify when applicable. Close as CHECKPOINT if any claimed flow or item remains unproven or blocked."
