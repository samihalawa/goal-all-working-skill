interface:
  display_name: "Goal All Working"
  short_description: "Convert a broad all-functionality request into a compact goal, then analyze and finish every user-visible repo flow"
  default_prompt: "Use $goal-all-working-skill when the user says the whole app/repo must work, no placeholders or non-working functionality can remain, every menu button and flow must be usable, or asks for a compact Goal to pursue prompt. First reconstruct the real intent from relevant conversation/history, then inventory all routes, menus, forms, buttons, mocks, placeholders, API/DB paths, auth states, saved/contact/chat flows, loading/error/empty/success states, and duplicated entry points. Classify every surface as works_proven, needs_fix, placeholder_or_mock, dead_or_non_persistent, blocked_external, or intentionally_static. Do not trust prior done/fixed claims. Fix the failure classes, sweep siblings, verify at the same user-visible layer, red-team false finishes, then commit, push, and live/user-surface verify when possible. Close as CHECKPOINT if any claimed flow remains unproven or blocked."
